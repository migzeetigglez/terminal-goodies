<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#020402"/>

  <defs>
    <pattern id="scanlines" width="1" height="8" patternUnits="userSpaceOnUse">
      <rect width="1" height="3" fill="#6cff4f" opacity="0.55"/>
      <rect y="3" width="1" height="5" fill="#020402" opacity="0.15"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="wy-mark">
      <polygon points="135,220 365,220 470,420 575,220 625,220 730,420 835,220 1065,220 780,500 635,285 600,285 565,285 420,500"/>
      <polygon points="370,220 520,220 445,360"/>
      <polygon points="680,220 830,220 755,360"/>
    </clipPath>
  </defs>

  <g filter="url(#glow)" fill="#6cff4f">
    <text x="600" y="142"
          text-anchor="middle"
          font-family="Eurostile, Microgramma, Bank Gothic, Orbitron, Arial Black, sans-serif"
          font-size="72"
          font-weight="700"
          letter-spacing="7">WEYLAND-YUTANI CORP</text>

    <g clip-path="url(#wy-mark)">
      <rect x="120" y="205" width="960" height="310" fill="url(#scanlines)"/>
    </g>

    <text x="600" y="560"
          text-anchor="middle"
          font-family="Eurostile, Microgramma, Bank Gothic, Orbitron, Arial Black, sans-serif"
          font-size="48"
          font-weight="700"
          letter-spacing="6">BUILDING BETTER WORLDS</text>
  </g>

  <g opacity="0.20">
    <rect y="0" width="1200" height="675" fill="url(#scanlines)"/>
  </g>
</svg>
