"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ WY ](bg:amber fg:black)\
$username\
[](bg:olive fg:amber)\
$directory\
[](bg:red fg:olive)\
$git_branch\
$git_status\
[](bg:green fg:red)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](bg:terminal fg:green)\
$time\
[ ](fg:terminal)\
$cmd_duration\
$line_break\
$character\
${custom.reset}"""

palette = 'weyland'

[username]
show_always = true
style_user = "bg:amber fg:black"
style_root = "bg:red fg:black"
format = '[ $user]($style)'

[directory]
style = "bg:olive fg:bone"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ".../"

[directory.substitutions]
"Documents" = "DOCS "
"Downloads" = "DL "
"Music" = "AUD "
"Pictures" = "IMG "
"Developer" = "DEV "

[git_branch]
symbol = "BR"
style = "bg:red"
format = '[[ $symbol $branch ](fg:black bg:red)]($style)'

[git_status]
style = "bg:red"
format = '[[($all_status$ahead_behind )](fg:black bg:red)]($style)'

[nodejs]
symbol = "NODE"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:black bg:green)]($style)'

[c]
symbol = "C"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:black bg:green)]($style)'

[rust]
symbol = "RS"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:black bg:green)]($style)'

[golang]
symbol = "GO"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:black bg:green)]($style)'

[php]
symbol = "PHP"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:black bg:green)]($style)'

[java]
symbol = "JVM"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:black bg:green)]($style)'

[kotlin]
symbol = "KT"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:black bg:green)]($style)'

[haskell]
symbol = "HS"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:black bg:green)]($style)'

[python]
symbol = "PY"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:black bg:green)]($style)'

[conda]
disabled = true

[time]
disabled = false
time_format = "%I:%M %p"
style = "bg:terminal fg:amber"
format = '[ ORDER 937 $time ]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[>](bold fg:green)'
error_symbol = '[>](bold fg:red)'
vimcmd_symbol = '[<](bold fg:green)'
vimcmd_replace_one_symbol = '[<](bold fg:amber)'
vimcmd_replace_symbol = '[<](bold fg:amber)'
vimcmd_visual_symbol = '[<](bold fg:red)'

[cmd_duration]
show_milliseconds = false
format = "runtime $duration "
style = "fg:amber"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[custom.reset]
command = "printf '\\033[0m'"
when = "true"
format = "$output"
unsafe_no_escape = true

[palettes.weyland]
black = "#050504"
bone = "#d8d1b0"
amber = "#d7b65a"
olive = "#28352b"
green = "#78ff9a"
terminal = "#3a331f"
red = "#c34838"
